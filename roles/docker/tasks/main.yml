- name: "Install docker required packages"
  become: yes
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    update_cache: yes
- name: Get architecture
  command: dpkg --print-architecture
  register: dpkg_architecture
- name: "Add Docker's repository"
  become: yes
  deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/debian
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: stable
    architectures: "{{ dpkg_architecture.stdout }}"
    signed_by: https://download.docker.com/linux/debian/gpg
    enabled: yes
- name: "Install Docker"
  become: yes
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: yes
- name: Create docker group
  become: yes
  group:
    name: docker
- name: Add {{ ansible_user }} to docker group
  become: yes
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
- meta: reset_connection
- name: Create /etc/systemd/system/docker.service.d directory
  become: yes
  file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: '0755'
- name: Ensure Docker service starts after firewalld
  become: yes
  copy:
    dest: /etc/systemd/system/docker.service.d/firewalld-dependency.conf
    mode: '0644'
    content: |
      [Unit]
      After=firewalld.service
      Requires=firewalld.service
  notify: Reload systemd daemon
- meta: flush_handlers
