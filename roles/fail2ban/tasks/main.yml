- name: Install fail2ban
  become: yes
  apt:
    name:
      - fail2ban
    update_cache: yes
- name: Configure fail2ban
  become: yes
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
  notify: restart fail2ban
- name: Create /etc/systemd/system/fail2ban.service.d directory
  become: yes
  file:
    path: /etc/systemd/system/fail2ban.service.d
    state: directory
    mode: '0755'
- name: Ensure fail2ban service starts after firewalld
  become: yes
  copy:
    dest: /etc/systemd/system/fail2ban.service.d/firewalld-dependency.conf
    mode: '0644'
    content: |
      [Unit]
      After=firewalld.service
      Requires=firewalld.service
  notify: Reload systemd daemon
- meta: flush_handlers
